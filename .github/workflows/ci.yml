name: ci

# This workflow does NOT consume any untrusted github.event.* inputs in
# `run:` blocks — only checkout, deps install, and test execution.
# See https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
  pull_request:

jobs:
  backend:
    name: backend (ruff + pytest offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.22"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest (offline only)
        run: uv run pytest -q -m "not live"

  evals:
    name: evals (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.22"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --all-extras

      - name: Run eval harness
        run: uv run python evals/run_local.py

  web:
    name: web (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Vitest
        run: npm run test -- --run

      - name: Build
        run: npm run build
